runtime:
  backend: cuda
  seed: 42
  checkpoint_dir: earth_world_model/checkpoints/ssl4eo_zarr_val_cuda_randomcrop_large
  autocast_dtype: float16

data:
  kind: ssl4eo_zarr
  root_dir: data/raw/ssl4eo_zarr_minimal
  split: val
  patch_size: 128
  max_shards: 0
  max_samples: 0
  min_clear_fraction: 0.8
  crop_mode: random
  repeat_factor: 16
  num_workers: 0

model:
  input_mode: s2s1
  embed_dim: 768
  patch_px: 8
  temporal_depth: 8
  predictor_depth: 4
  num_heads: 12

training:
  batch_size: 96
  epochs: 5
  lr: 3.0e-4
  weight_decay: 0.05
  mask_ratio: 0.5
  ema_momentum_start: 0.996
  ema_momentum_end: 0.999
  log_every_steps: 4
  save_every_epochs: 1
  max_steps_per_epoch: 0
