runtime:
  backend: ${EWM_BACKEND:-cuda}
  seed: 42
  checkpoint_dir: ${EWM_CHECKPOINT_DIR:-/tmp/ewm_prelim_400_gpu/checkpoints/ssl4eo_zarr_trainval_400_vjepa21_staged_rope_dense_conv3d_1024_cuda}
  autocast_dtype: float16

data:
  kind: ssl4eo_zarr
  root_dir: ${EWM_SSL4EO_ROOT_DIR:-/mnt/ewm-data-disk/ewm_prelim_400_v1/ssl4eo_400}
  split: train
  patch_size: 128
  max_shards: 0
  sample_offset: 0
  max_samples: ${EWM_SSL4EO_TRAIN_MAX_SAMPLES:-400}
  min_clear_fraction: 0.8
  crop_mode: random
  repeat_factor: 1
  num_workers: ${EWM_NUM_WORKERS:-8}
  prefetch_factor: ${EWM_PREFETCH_FACTOR:-2}
  assume_single_sample_per_shard: false
  max_open_shards: 16
  batch_sampler: auto

model:
  input_mode: s2s1
  tokenizer_type: conv3d
  tubelet_size: 2
  embed_dim: 1024
  patch_px: 16
  temporal_depth: 6
  predictor_depth: 3
  num_heads: 16
  hierarchical_layers: [1, 3, 5]
  token_mode: dense
  spatial_fusion: cross_attend
  fusion_num_heads: 8
  separate_sensor_encoders: true
  use_modality_embeddings: true
  use_patch_positional_encoding: true
  use_missing_modality_embeddings: true
  use_time_gap_features: true
  temporal_block_type: factorized_rope
  use_rope_temporal_attention: true
  rope_base: 10000.0
  use_activation_checkpointing: true
  enable_latent_dynamics: true

training:
  batch_size: 64
  epochs: 3
  lr_schedule: warmup_hold_cosine
  warmup_fraction: 0.05
  hold_fraction: 0.10
  start_lr: 3.0e-5
  lr: 3.0e-4
  final_lr: 3.0e-5
  weight_decay: 0.05
  final_weight_decay: 0.04
  mask_ratio: 0.5
  masking_mode: dense_block3d
  block_mask_cfgs:
    - num_blocks: 8
      spatial_scale: [0.10, 0.20]
      temporal_scale: [0.25, 0.50]
      aspect_ratio: [0.75, 1.5]
    - num_blocks: 2
      spatial_scale: [0.50, 0.70]
      temporal_scale: [0.50, 1.00]
      aspect_ratio: [0.75, 1.5]
  ema_momentum_start: 0.996
  ema_momentum_end: 0.999
  log_every_steps: 20
  save_every_epochs: 1
  max_steps_per_epoch: 0
  predict_visible_context: true
  context_loss_weight: 0.5
  context_loss_distance_weighted: true
  context_loss_sqrt_distance: true
  cross_sensor_loss_weight: 0.1
  dynamics_loss_weight: 0.1
  dynamics_rollout_horizon: 2

eval:
  enabled: true
  every_epochs: 1
  batch_size: 64
  max_batches: 0
  mask_mode: random
  data:
    split: val
    sample_offset: 0
    max_samples: ${EWM_SSL4EO_VAL_MAX_SAMPLES:-128}
    crop_mode: center
    repeat_factor: 1
    num_workers: ${EWM_EVAL_NUM_WORKERS:-8}
    prefetch_factor: ${EWM_EVAL_PREFETCH_FACTOR:-2}
    assume_single_sample_per_shard: false
    max_open_shards: 16
