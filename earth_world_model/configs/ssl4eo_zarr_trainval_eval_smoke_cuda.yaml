runtime:
  backend: cuda
  seed: 42
  checkpoint_dir: earth_world_model/checkpoints/ssl4eo_zarr_trainval_eval_smoke_cuda
  autocast_dtype: float16

data:
  kind: ssl4eo_zarr
  root_dir: data/raw/ssl4eo_zarr_minimal
  split: val
  patch_size: 128
  max_shards: 0
  sample_offset: 0
  max_samples: 192
  min_clear_fraction: 0.8
  crop_mode: random
  repeat_factor: 2
  num_workers: ${EWM_NUM_WORKERS:-8}
  prefetch_factor: ${EWM_PREFETCH_FACTOR:-2}
  batch_sampler: auto

model:
  input_mode: s2s1
  embed_dim: 256
  patch_px: 8
  temporal_depth: 4
  predictor_depth: 2
  num_heads: 4

training:
  batch_size: 16
  epochs: 1
  lr: 3.0e-4
  weight_decay: 0.05
  mask_ratio: 0.5
  ema_momentum_start: 0.996
  ema_momentum_end: 0.999
  log_every_steps: 2
  save_every_epochs: 1
  max_steps_per_epoch: 4

eval:
  enabled: true
  every_epochs: 1
  batch_size: 16
  max_batches: 2
  mask_mode: all
  data:
    split: val
    sample_offset: 192
    max_samples: 64
    crop_mode: center
    repeat_factor: 1
    num_workers: ${EWM_EVAL_NUM_WORKERS:-8}
    prefetch_factor: ${EWM_EVAL_PREFETCH_FACTOR:-2}
