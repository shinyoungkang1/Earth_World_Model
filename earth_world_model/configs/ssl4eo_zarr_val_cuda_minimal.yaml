runtime:
  backend: cuda
  seed: 42
  checkpoint_dir: earth_world_model/checkpoints/ssl4eo_zarr_val_cuda_minimal
  autocast_dtype: float16

data:
  kind: ssl4eo_zarr
  root_dir: data/raw/ssl4eo_zarr_minimal
  split: val
  patch_size: 128
  max_shards: 2
  max_samples: 32
  min_clear_fraction: 0.8
  num_workers: 0

model:
  input_mode: s2s1
  embed_dim: 128
  patch_px: 8
  temporal_depth: 2
  predictor_depth: 1
  num_heads: 4

training:
  batch_size: 2
  epochs: 1
  lr: 3.0e-4
  weight_decay: 0.05
  mask_ratio: 0.5
  ema_momentum_start: 0.996
  ema_momentum_end: 0.999
  log_every_steps: 1
  save_every_epochs: 1
  max_steps_per_epoch: 4
