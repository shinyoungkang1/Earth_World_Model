runtime:
  backend: ${EWM_BACKEND:-cuda}
  seed: 42
  checkpoint_dir: ${EWM_CHECKPOINT_DIR:-/tmp/ewm_dense_temporal_gpu/checkpoints/dense_temporal_index_vjepa21_staged_rope_cuda}
  autocast_dtype: float16

data:
  kind: dense_temporal_index
  index_path: ${EWM_DENSE_INDEX_PATH:-/tmp/ewm_dense_temporal/data/train/dense_temporal_index.parquet}
  patch_size: 256
  max_samples: 0
  min_paired_frames: 4
  min_paired_fraction: 0.0
  sample_offset: 0
  crop_mode: random
  repeat_factor: 1
  num_workers: 4

model:
  input_mode: s2s1
  embed_dim: 384
  patch_px: 8
  temporal_depth: 6
  predictor_depth: 3
  num_heads: 8
  hierarchical_layers: [1, 3, 5]
  token_mode: dense
  spatial_fusion: late_concat
  use_modality_embeddings: true
  use_patch_positional_encoding: true
  use_missing_modality_embeddings: true
  temporal_block_type: stage_d_rope
  use_rope_temporal_attention: true
  rope_base: 10000.0
  use_activation_checkpointing: true

training:
  batch_size: 16
  epochs: 3
  lr_schedule: warmup_hold_cosine
  warmup_fraction: 0.05
  hold_fraction: 0.10
  start_lr: 3.0e-5
  lr: 3.0e-4
  final_lr: 3.0e-5
  weight_decay: 0.05
  final_weight_decay: 0.04
  mask_ratio: 0.5
  ema_momentum_start: 0.996
  ema_momentum_end: 0.999
  log_every_steps: 20
  save_every_epochs: 1
  max_steps_per_epoch: 0
  predict_visible_context: true
  context_loss_weight: 0.5
  context_loss_distance_weighted: true
  context_loss_sqrt_distance: true

eval:
  enabled: true
  every_epochs: 1
  batch_size: 16
  max_batches: 0
  mask_mode: all
  data:
    index_path: ${EWM_DENSE_EVAL_INDEX_PATH:-/tmp/ewm_dense_temporal/data/val/dense_temporal_index.parquet}
    max_samples: 0
    min_paired_frames: 4
    min_paired_fraction: 0.0
    sample_offset: 0
    crop_mode: center
    repeat_factor: 1
    num_workers: 4
