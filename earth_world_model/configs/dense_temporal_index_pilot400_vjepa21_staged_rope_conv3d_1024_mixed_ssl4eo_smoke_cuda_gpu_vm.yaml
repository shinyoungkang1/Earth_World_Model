runtime:
  backend: ${EWM_BACKEND:-cuda}
  seed: 42
  checkpoint_dir: ${EWM_CHECKPOINT_DIR:-/tmp/ewm_paper2_mixed_smoke_gpu/checkpoints/dense_temporal_index_pilot400_vjepa21_staged_rope_conv3d_1024_mixed_ssl4eo_smoke_cuda}
  autocast_dtype: float16

data:
  kind: dense_temporal_index
  index_path: ${EWM_YEARLY_TRAIN_INDEX_PATH:-/mnt/ewm-data-disk/ewm_prelim_500_1000_v1/yearly_500/train/dense_temporal_index.parquet}
  patch_size: 256
  max_samples: ${EWM_YEARLY_TRAIN_MAX_SAMPLES:-32}
  min_paired_frames: 4
  min_paired_fraction: 0.0
  sample_offset: 0
  crop_mode: random
  repeat_factor: 1
  num_workers: ${EWM_NUM_WORKERS:-4}
  prefetch_factor: ${EWM_PREFETCH_FACTOR:-2}
  temporal_subclip_mode: random
  temporal_subclip_schedule:
    - start_epoch: 0
      length: 16

auxiliary_data:
  enabled: true
  kind: ssl4eo_zarr
  root_dir: ${EWM_SSL4EO_ROOT_DIR:-/mnt/ewm-data-disk/ewm_prelim_500_1000_v1/ssl4eo_1000}
  split: train
  patch_size: 128
  max_shards: 0
  sample_offset: 0
  max_samples: ${EWM_SSL4EO_TRAIN_MAX_SAMPLES:-64}
  min_clear_fraction: 0.8
  crop_mode: random
  repeat_factor: 1
  num_workers: ${EWM_NUM_WORKERS:-4}
  prefetch_factor: ${EWM_PREFETCH_FACTOR:-2}
  assume_single_sample_per_shard: false
  max_open_shards: 16
  batch_sampler: auto
  batch_size: 2

model:
  input_mode: s2s1
  tokenizer_type: conv3d
  tubelet_size: 2
  embed_dim: 1024
  patch_px: 16
  temporal_depth: 6
  predictor_depth: 3
  num_heads: 16
  hierarchical_layers: [1, 3, 5]
  token_mode: dense
  spatial_fusion: cross_attend
  fusion_num_heads: 8
  separate_sensor_encoders: true
  use_modality_embeddings: true
  use_patch_positional_encoding: true
  use_missing_modality_embeddings: true
  use_time_gap_features: true
  temporal_block_type: factorized_rope
  use_rope_temporal_attention: true
  rope_base: 10000.0
  use_activation_checkpointing: true
  enable_latent_dynamics: true

training:
  batch_size: 2
  auxiliary_batch_size: 2
  epochs: 1
  mixed_stage_epochs: 1
  mixed_stage_auxiliary_fraction: 0.5
  lr_schedule: fixed
  lr: 3.0e-4
  weight_decay: 0.05
  final_weight_decay: 0.05
  mask_ratio: 0.5
  masking_mode: dense_block3d
  block_mask_cfgs:
    - num_blocks: 8
      spatial_scale: [0.10, 0.20]
      temporal_scale: [0.125, 0.25]
      aspect_ratio: [0.75, 1.5]
    - num_blocks: 2
      spatial_scale: [0.50, 0.70]
      temporal_scale: [0.25, 0.50]
      aspect_ratio: [0.75, 1.5]
  ema_momentum_start: 0.996
  ema_momentum_end: 0.999
  log_every_steps: 1
  save_every_epochs: 1
  max_steps_per_epoch: 2
  predict_visible_context: true
  context_loss_weight: 0.5
  context_loss_distance_weighted: true
  context_loss_sqrt_distance: true
  cross_sensor_loss_weight: 0.1
  dynamics_loss_weight: 0.1
  dynamics_rollout_horizon: 2

eval:
  enabled: false
