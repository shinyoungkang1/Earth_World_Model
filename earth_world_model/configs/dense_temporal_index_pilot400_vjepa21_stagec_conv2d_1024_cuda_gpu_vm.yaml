runtime:
  backend: ${EWM_BACKEND:-cuda}
  seed: 42
  checkpoint_dir: ${EWM_CHECKPOINT_DIR:-/tmp/ewm_prelim_400_gpu/checkpoints/dense_temporal_index_pilot400_vjepa21_stagec_conv2d_1024_cuda}
  autocast_dtype: float16

data:
  kind: dense_temporal_index
  index_path: ${EWM_YEARLY_TRAIN_INDEX_PATH:-/mnt/ewm-data-disk/ewm_prelim_400_v1/yearly_400/train/dense_temporal_index.parquet}
  patch_size: 256
  max_samples: ${EWM_YEARLY_TRAIN_MAX_SAMPLES:-400}
  min_paired_frames: 4
  min_paired_fraction: 0.0
  sample_offset: 0
  crop_mode: random
  repeat_factor: 1
  num_workers: ${EWM_NUM_WORKERS:-8}
  prefetch_factor: ${EWM_PREFETCH_FACTOR:-2}
  temporal_subclip_mode: random
  temporal_subclip_schedule:
    - start_epoch: 0
      length: 16
    - start_epoch: 1
      length: 32
    - start_epoch: 2
      length: 52

model:
  input_mode: s2s1
  tokenizer_type: conv2d
  embed_dim: 1024
  patch_px: 16
  temporal_depth: 6
  predictor_depth: 3
  num_heads: 16
  hierarchical_layers: [1, 3, 5]
  token_mode: dense
  spatial_fusion: cross_attend
  fusion_num_heads: 8
  use_modality_embeddings: true
  use_patch_positional_encoding: true
  use_missing_modality_embeddings: true
  temporal_block_type: factorized_rope
  use_rope_temporal_attention: true
  rope_base: 10000.0
  use_activation_checkpointing: true
  enable_latent_dynamics: true

training:
  batch_size: 4
  epochs: 3
  lr_schedule: warmup_hold_cosine
  warmup_fraction: 0.05
  hold_fraction: 0.10
  start_lr: 3.0e-5
  lr: 3.0e-4
  final_lr: 3.0e-5
  weight_decay: 0.05
  final_weight_decay: 0.04
  mask_ratio: 0.5
  masking_mode: dense_block3d
  block_mask_cfgs:
    - num_blocks: 8
      spatial_scale: [0.10, 0.20]
      temporal_scale: [0.125, 0.25]
      aspect_ratio: [0.75, 1.5]
    - num_blocks: 2
      spatial_scale: [0.50, 0.70]
      temporal_scale: [0.25, 0.50]
      aspect_ratio: [0.75, 1.5]
  ema_momentum_start: 0.996
  ema_momentum_end: 0.999
  log_every_steps: 10
  save_every_epochs: 1
  max_steps_per_epoch: 0
  predict_visible_context: true
  context_loss_weight: 0.5
  context_loss_distance_weighted: true
  context_loss_sqrt_distance: true
  dynamics_loss_weight: 0.1
  dynamics_rollout_horizon: 4

eval:
  enabled: true
  every_epochs: 1
  batch_size: 4
  max_batches: 0
  mask_mode: random
  data:
    index_path: ${EWM_YEARLY_VAL_INDEX_PATH:-/mnt/ewm-data-disk/ewm_prelim_400_v1/yearly_400/val/dense_temporal_index.parquet}
    max_samples: ${EWM_YEARLY_VAL_MAX_SAMPLES:-32}
    min_paired_frames: 4
    min_paired_fraction: 0.0
    sample_offset: 0
    crop_mode: center
    repeat_factor: 1
    num_workers: ${EWM_EVAL_NUM_WORKERS:-8}
    prefetch_factor: ${EWM_EVAL_PREFETCH_FACTOR:-2}
    temporal_subclip_length: 52
    temporal_subclip_mode: center
